[service]
id = "openai_codex"
name = "OpenAI Codex"
# Classification for browse/filter and policy tag-floors; lowercase-kebab, multi OK.
tags = ["ai"]
group = "openai"

# Codex talks to the ChatGPT backend with a minted OAuth access token plus a
# derived `chatgpt-account-id` (the `account_id` exposes phantom, read from the
# id_token at connect). The static `OpenAI-Beta` header is the agent's to write.
hosts = ["chatgpt.com", "api.openai.com"]
secrets = ["OPENAI_CODEX_REFRESH_TOKEN"]

# OpenAI has no third-party app registry — "sign in with ChatGPT" exists only
# through the PUBLIC client of the open-source Codex CLI, so its id, endpoints,
# and whitelisted loopback redirect are reused verbatim here. Pure PKCE (no
# client_secret). The consent lands on localhost:1455 (nothing listens — the
# console's paste-the-URL step reads the code out, same UX as gmail).
# `provider = "openai"` is the frontend display label only.
[oauth2]
provider = "openai"
authorization_url = "https://auth.openai.com/oauth/authorize"
token_url = "https://auth.openai.com/oauth/token"
client_id = "app_EMoamEEZ73f0CkXaXp7hrann"
pkce = true
redirect_uri = "http://localhost:1455/auth/callback"
scopes = ["openid", "profile", "email", "offline_access"]
refresh_token = "OPENAI_CODEX_REFRESH_TOKEN"
exposes = ["account_id"]

# The ChatGPT account id lives in a namespaced id_token claim; older tokens
# carried it top-level (the leaf name is auto-tried as a fallback).
[oauth2.claims]
account_id = ["https://api.openai.com/auth", "chatgpt_account_id"]

# Codex CLI's own consent-URL params (build_authorize_url in openai/codex):
# the simplified flow renders the code-on-page consent this client expects, and
# id_token_add_organizations puts the account claims into the id_token.
[oauth2.authorize_params]
id_token_add_organizations = "true"
codex_cli_simplified_flow = "true"
