[service]
id = "deepseek"
name = "DeepSeek"
sub = "DeepSeek API"
category = "llm"

[[upstream]]
id = "default"
url = "https://api.deepseek.com"
auth = { type = "bearer", placeholder = "sk-..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "allow"
write = "allow"
