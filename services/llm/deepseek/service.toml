[service]
id = "deepseek"
name = "DeepSeek"
sub = "DeepSeek API"
category = "llm"
color = "#5b5de5"
docs = "https://platform.deepseek.com/api-docs"

[upstream]
url = "https://api.deepseek.com"

[auth]
type = "bearer"
