[service]
id = "openai_codex"
name = "OpenAI Codex"
group = "openai"

# Codex talks to the ChatGPT backend with a minted OAuth access token plus a
# derived `chatgpt-account-id` (exposed). The static `openai-beta` header is the
# agent's to write. Provider `openai` is curated/PR-only and not yet shipped, so
# this parses as valid v4 but stays non-functional until that provider lands.
hosts = ["chatgpt.com", "api.openai.com"]

[oauth2]
provider = "openai"
secret = "OPENAI_CODEX_REFRESH_TOKEN"
exposes = ["account_id"]
