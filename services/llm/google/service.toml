[service]
id = "google"
name = "Google AI"
sub = "Gemini"
category = "llm"

[[upstream]]
id = "default"
url = "https://generativelanguage.googleapis.com"
auth = { env = "GEMINI_API_KEY", placeholder = "AIza..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

  [upstream.query]
  key = "{{secret.GEMINI_API_KEY}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

