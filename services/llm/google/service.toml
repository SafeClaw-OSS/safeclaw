[service]
id = "google"
name = "Google AI"
sub = "Gemini"
category = "llm"

[[upstream]]
id = "default"
url = "https://generativelanguage.googleapis.com"
auth = { type = "query", param = "key", placeholder = "AIza..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "allow"
write = "allow"
