[service]
id = "google"
name = "Google AI"
sub = "Gemini"
category = "llm"

[[upstream]]
id = "default"
url = "https://generativelanguage.googleapis.com"
auth = { env = "google_api_key", placeholder = "AIza..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

  [upstream.query]
  key = "{{auth_value}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

