[service]
id = "claude-code"
name = "Claude Code"
sub = "Claude Code OAuth"
category = "llm"
group = "anthropic"

[upstream]
url = "https://api.anthropic.com"

[upstream.auth]
type = "oauth2"
oauth_style = "json"

[upstream.headers]
"anthropic-beta" = "oauth-2025-04-20,interleaved-thinking-2025-05-14"
"user-agent" = "claude-cli/2.1.87 (external, cli)"
"x-claude-code-session-id" = "{{uuid_v4}}"

[upstream.locked]
template = "anthropic"

[policy.levels]
read = "allow"
write = "allow"
