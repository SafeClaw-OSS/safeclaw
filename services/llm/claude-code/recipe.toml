[recipe]
id = "claude-code"
display_name = "Claude Code"

[[steps]]
title = "Register Anthropic provider"
target = "openclaw"
run = """openclaw config set models.providers.anthropic '{"apiKey":"sk-safeclaw-proxy","baseUrl":"http://localhost:{{proxy_port}}/anthropic/v1","api":"anthropic-messages","models":[]}' --strict-json"""

[[steps]]
title = "Configure Claude CLI backend"
target = "openclaw"
run = """openclaw config set agents.defaults.cliBackends '{"claude-cli":{"command":"/usr/local/bin/claude"}}' --strict-json"""

[[steps]]
title = "Disable sandbox for Claude CLI"
target = "openclaw"
run = """openclaw config set agents.defaults.sandbox '{"mode":"off"}' --strict-json"""

[[steps]]
title = "Write Claude CLI credentials"
target = "openclaw"
files = [
  { path = ".claude/.credentials.json", template = "claude-credentials.json" },
]
note = "Writes OAuth tokens to the Claude CLI credentials file"

[[steps]]
title = "Restart OpenClaw"
target = "openclaw"
restart = true
