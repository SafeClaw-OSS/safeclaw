[service]
id = "anthropic"
name = "Anthropic"
description = "Claude AI models via API key"
category = "llm"
color = "#d4a017"
docs = "https://docs.anthropic.com"

[upstream]
url = "https://api.anthropic.com"

[auth]
type = "header"
header = "x-api-key"
key_placeholder = "sk-ant-api03-..."

[defaults]
levels = { read = "allow", write = "allow" }

[locked_response]
template = "anthropic"
