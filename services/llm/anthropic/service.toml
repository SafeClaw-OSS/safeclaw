[service]
id = "anthropic"
name = "Anthropic"
sub = "API Key"
category = "llm"
group = "anthropic"

[[upstream]]
id = "default"
url = "https://api.anthropic.com"
auth = { type = "header", header = "x-api-key", placeholder = "sk-ant-api03-..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "allow"
write = "allow"
