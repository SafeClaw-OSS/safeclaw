[service]
id = "anthropic"
name = "Anthropic"
sub = "API Key"
category = "llm"
group = "anthropic"

[[upstream]]
id = "default"
url = "https://api.anthropic.com"
auth = { env = "anthropic_api_key", placeholder = "sk-ant-api03-..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

  [upstream.headers]
  x-api-key = "{{secret.anthropic_api_key}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

