[service]
id = "openai-codex"
name = "OpenAI Codex"
sub = "ChatGPT"
category = "llm"
group = "openai"

[upstream]
url = "https://api.openai.com"

[upstream.auth]
type = "oauth2"

[upstream.headers]
"openai-beta" = "responses=experimental"
"chatgpt-account-id" = "{{auth.account_id}}"

[upstream.locked]
template = "openai"

[upstream.locked.routes]
"/responses" = "openai-responses"

[policy.levels]
read = "allow"
write = "allow"
