[service]
id = "openai-codex"
name = "OpenAI Codex"
description = "ChatGPT/Codex via OAuth subscription"
category = "llm"
color = "#10a37f"
docs = "https://platform.openai.com/docs"

[upstream]
url = "https://api.openai.com"

[auth]
type = "oauth2"

[defaults]
levels = { read = "allow", write = "allow" }

[headers]
"openai-beta" = "responses=experimental"
"chatgpt-account-id" = "{{auth.account_id}}"

[locked_response]
template = "openai"

[locked_response.routes]
"/responses" = "openai-responses"
