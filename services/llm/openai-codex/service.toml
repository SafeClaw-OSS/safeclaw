[service]
id = "openai-codex"
name = "OpenAI Codex"
group = "openai"

[[upstream]]
id = "default"
url = "https://api.openai.com"
auth = { type = "oauth2" }
headers = { "openai-beta" = "responses=experimental", "chatgpt-account-id" = "{{auth.account_id}}" }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

