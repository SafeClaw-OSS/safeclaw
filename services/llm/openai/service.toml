[service]
id = "openai"
name = "OpenAI"
sub = "API Key"
category = "llm"
group = "openai"

[upstream]
url = "https://api.openai.com"

[upstream.auth]
type = "bearer"
key_placeholder = "sk-..."

[upstream.locked]
template = "openai"

[upstream.locked.routes]
"/responses" = "openai-responses"

[policy.levels]
read = "allow"
write = "allow"
