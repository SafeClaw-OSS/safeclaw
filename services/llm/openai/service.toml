[service]
id = "openai"
name = "OpenAI"
sub = "API Key"
category = "llm"
group = "openai"

[[upstream]]
id = "default"
url = "https://api.openai.com"
auth = { type = "bearer", env = "openai_api_key", placeholder = "sk-..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

