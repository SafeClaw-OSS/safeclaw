[service]
id = "groq"
name = "Groq"

[[upstream]]
id = "default"
url = "https://api.groq.com/openai/v1"
auth = { env = "GROQ_API_KEY", placeholder = "gsk_..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

  [upstream.headers]
  Authorization = "Bearer {{secret.GROQ_API_KEY}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

