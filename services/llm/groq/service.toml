[service]
id = "groq"
name = "Groq"
sub = "Fast inference"
category = "llm"

[[upstream]]
id = "default"
url = "https://api.groq.com/openai/v1"
auth = { type = "bearer", placeholder = "gsk_..." }
locked = { response = "Please unlock the SafeClaw vault to use this service." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

