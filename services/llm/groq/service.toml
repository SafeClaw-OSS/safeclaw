[service]
id = "groq"
name = "Groq"
description = "Fast inference for open models"
category = "llm"
color = "#f55036"
docs = "https://console.groq.com/docs"

[upstream]
url = "https://api.groq.com/openai/v1"

[auth]
type = "bearer"
key_placeholder = "gsk_..."

[defaults]
levels = { read = "allow", write = "allow" }

[locked_response]
template = "openai"
