[recipe]
id = "groq"
display_name = "Groq"

[[steps]]
title = "Register Groq provider"
target = "openclaw"
run = """openclaw config set models.providers.groq '{"apiKey":"sk-safeclaw-proxy","baseUrl":"http://localhost:{{safeclaw.proxy_port}}/groq/openai/v1","api":"openai-completions","models":[]}' --strict-json"""

[[steps]]
title = "Restart OpenClaw"
target = "openclaw"
restart = true
