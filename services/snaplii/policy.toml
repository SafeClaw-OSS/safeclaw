# Snaplii policy (A2M API, aipayment.snaplii.com/v2). The api key and the
# minted JWT never enter the agent and egress is host-anchored, so browsing
# the catalog, quoting a price, and checking the balance ride the allow floor.
# The gate is spent where the money moves: a purchase is an irreversible spend
# of pre-funded wallet balance. Snaplii's own per-key daily cap backstops
# whatever this file misses; the two layers are complementary (their cap
# bounds the total, our gate approves each spend).
#
# Paths below are ground truth from Snaplii's agent-to-merchant-payments repo
# (github.com/Snaplii-Inc, 2026-07-09). Bill-pay endpoints exist but their
# REST paths are not documented there yet — pin them down at e2e and add the
# pay-step gate then; until anchored+documented they cannot be reached through
# this connection's floor rules any differently than purchase's siblings.

[default]
read = "allow"
write = "allow"

# ── Spend wallet balance (irreversible) ──────────────────────────────────────
# The quote (POST /v2/quote) deliberately stays on the floor: it prices a cart
# without committing anything — gating it would put friction on the browse
# loop while the purchase itself is already gated.
# A purchase is an irreversible spend, so it is `ask-always` — approved EVERY
# time and bound to the exact amount + merchant (service.toml
# `[requests.purchase]`). Not a plain `ask`: an `ask` opens a reuse window, and
# for money a reusable window means the identical spend can repeat unprompted —
# so a spend must be single-use. Binding means approving "$80 to Acme" cannot be
# redeemed as "$180" or "to a different merchant"; the console shows exactly
# that line ("Buy from Acme for 80").
[[rule]]
id = "purchase"
label = "Buy a gift card (spends wallet balance)"
match = "POST /v2/purchase"
level = "ask-always"

# A hard ceiling, gated on the body amount (`when`): a purchase over $1000 is
# blocked outright, not just prompted. Demonstrates a field-value decision
# composing by most-restrictive-wins (deny beats ask-always). `vars.amount` is
# the bound field; an undefined amount → this rule doesn't fire and the spend
# stays ask-always (never a bypass).
[[rule]]
id = "purchase-cap"
label = "Block a purchase over $1000"
match = "POST /v2/purchase"
when = "vars.amount > 1000"
level = "deny"
