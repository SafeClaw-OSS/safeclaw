setup = """
Neon's API takes a bearer API key. Put the phantom in the header; the proxy
substitutes it at egress, the key never enters the agent:
  sc run -- curl https://console.neon.tech/api/v2/projects \\
    -H "Authorization: Bearer __sc__neon__"
Multi-account: switch the phantom value (__sc__neon_work__).
"""

[service]
id = "neon"
name = "Neon"
# Classification for browse/filter and policy tag-floors; lowercase-kebab, multi OK.
tags = ["dev"]

hosts = ["console.neon.tech"]
secrets = ["NEON_API_KEY"]
# Where a human mints the secret (auxiliary; display-only helper link).
secret_url = "https://console.neon.tech/app/settings/api-keys"
