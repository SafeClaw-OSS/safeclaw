# Neon policy. The key never enters the agent and egress is host-anchored. A Neon
# project IS a database, so a delete here destroys data, not just config — every
# delete is gated. Minting an API key is also gated: it's a durable credential
# SafeClaw never sees, a direct end-run around credential separation. Routine
# reads and creates ride the floor. Each rule is a per-connection console toggle.
#
# Paths are relative to host console.neon.tech (base /api/v2). Single `*` = one
# segment, so `projects/*` matches project-level deletes only, not the deeper
# branch/database/role paths (each gated by its own rule below).

[default]
read = "allow"
write = "allow"

# ── Destroy data (irreversible) ──────────────────────────────────────────────
[[rule]]
id = "delete-project"
label = "Delete a project (destroys its database and every branch)"
match = "DELETE /api/v2/projects/*"
level = "ask-always"

[[rule]]
id = "delete-branch"
label = "Delete a branch"
match = "DELETE /api/v2/projects/*/branches/*"
level = "ask-always"

[[rule]]
id = "delete-database"
label = "Delete a database"
match = "DELETE /api/v2/projects/*/branches/*/databases/*"
level = "ask-always"

[[rule]]
id = "delete-role"
label = "Delete a role"
match = "DELETE /api/v2/projects/*/branches/*/roles/*"
level = "ask-always"

# ── Mint a durable credential (escapes the broker) ───────────────────────────
[[rule]]
id = "mint-api-key"
label = "Create an API key"
match = "POST /api/v2/api_keys"
level = "ask-always"
