[recipe]
id = "openclaw-runtime"
display_name = "OpenClaw Runtime"

# ── Gateway lifecycle ────────────────────────────────────────────────────────
# Provisioner stops openclaw during cook and executes all config commands in
# a temp container, so no auto-reload races occur regardless of gateway's
# file-watcher behavior.

# ── Runtime config (batch) ───────────────────────────────────────────────────
# - gateway.mode=local: non-interactive mode
# - models.mode=replace: disable built-in catalog (800+ models)
# - agents.defaults.thinkingDefault=adaptive: auto-pick thinking mode
# - messages.ackReactionScope=all: react to both DMs and group messages
# - messages.groupChat.mentionPatterns=[".*"]: treat every group message as a
#   mention so owner doesn't need to @-tag the bot. Safe because each channel
#   recipe sets groupAllowFrom=[ownerId], so only owner messages reach here.
# - tools.elevated.enabled=true: allow elevated tools (per-channel allowFrom
#   set by each channel recipe, e.g. tools.elevated.allowFrom.telegram)
[[steps]]
title = "Runtime config (batch)"
target = "openclaw"
run = """openclaw config set --batch-json '[{"path":"gateway.mode","value":"local"},{"path":"models.mode","value":"replace"},{"path":"agents.defaults.thinkingDefault","value":"adaptive"},{"path":"messages.ackReactionScope","value":"all"},{"path":"messages.groupChat.mentionPatterns","value":[".*"]},{"path":"tools.elevated.enabled","value":true}]' --strict-json"""

# ── Exec approvals ───────────────────────────────────────────────────────────
# VM is sandboxed and has no terminal; SafeClaw handles auth at the proxy layer.

[[steps]]
title = "Disable exec approval prompts (headless VM)"
target = "openclaw"
files = [{ path = ".openclaw/exec-approvals.json", content = '{"version":1,"defaults":{"security":"full","ask":"off","autoAllowSkills":true}}' }]
