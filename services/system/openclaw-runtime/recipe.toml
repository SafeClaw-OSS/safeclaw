[recipe]
id = "openclaw-runtime"
display_name = "OpenClaw Runtime"

# ── Gateway lifecycle ────────────────────────────────────────────────────────
# Provisioner stops openclaw during cook and executes all config commands in
# a temp container, so no auto-reload races occur regardless of gateway's
# file-watcher behavior.

[[steps]]
title = "Set gateway mode to local (non-interactive)"
target = "openclaw"
run = "openclaw config set gateway.mode local"

# ── Model catalog ────────────────────────────────────────────────────────────
# Replace built-in model list (800+ models) with only SafeClaw-registered providers.

[[steps]]
title = "Disable built-in model catalog"
target = "openclaw"
run = "openclaw config set models.mode replace"

# ── Agent defaults ───────────────────────────────────────────────────────────

[[steps]]
title = "Set default thinking mode"
target = "openclaw"
run = "openclaw config set agents.defaults.thinkingDefault adaptive"

# ── Exec approvals ───────────────────────────────────────────────────────────
# VM is sandboxed and has no terminal; SafeClaw handles auth at the proxy layer.

[[steps]]
title = "Disable exec approval prompts (headless VM)"
target = "openclaw"
files = [{ path = ".openclaw/exec-approvals.json", content = '{"version":1,"defaults":{"security":"full","ask":"off","autoAllowSkills":true}}' }]

# ── Elevated tools ───────────────────────────────────────────────────────────
# Enable elevated tool access globally. Per-channel allowFrom is set by each
# channel recipe (e.g. telegram adds owner to tools.elevated.allowFrom.telegram).
# Safe here because SafeClaw VMs are single-owner, isolated, disposable.

[[steps]]
title = "Enable elevated tool access"
target = "openclaw"
run = "openclaw config set tools.elevated.enabled true --strict-json"
