[service]
id = "weixin"
name = "WeChat iLink"
sub = "Messaging"
category = "channel"

[[upstream]]
id = "default"
url = "https://ilinkai.weixin.qq.com"
auth = { type = "bearer" }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "allow"
write = "allow"
