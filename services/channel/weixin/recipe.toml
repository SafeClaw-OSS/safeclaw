[recipe]
id = "weixin"
display_name = "WeChat iLink"

[[steps]]
title = "Install WeChat iLink plugin"
target = "openclaw"
run = "openclaw plugins install @tencent-weixin/openclaw-weixin@latest"

[[steps]]
title = "Enable WeChat iLink plugin"
target = "openclaw"
run = "openclaw plugins enable openclaw-weixin"

[[steps]]
title = "Configure WeChat channel"
target = "openclaw"
run = """openclaw config set channels.openclaw-weixin '{"enabled":true,"options":{"base_url":"http://localhost:{{proxy_port}}/wechat","token":"sk-dummy-safeclaw-wechat"}}' --strict-json"""

[[steps]]
title = "Create account config"
target = "openclaw"
files = [
  { path = ".openclaw/openclaw-weixin/accounts.json", content = '["safeclaw"]' },
  { path = ".openclaw/openclaw-weixin/accounts/safeclaw.json", template = "weixin-account.json" },
]

[[steps]]
title = "Restart OpenClaw"
target = "openclaw"
note = "Restart to load the new plugin"
restart = true
