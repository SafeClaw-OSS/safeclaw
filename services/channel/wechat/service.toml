[service]
id = "wechat"
name = "WeChat iLink"
sub = "Messaging"
category = "channel"

[[upstream]]
id = "default"
url = "https://ilinkai.weixin.qq.com"
auth = { env = "wechat_api_key" }

  [upstream.headers]
  Authorization = "Bearer {{secret.wechat_api_key}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

