[recipe]
id = "telegram"
display_name = "Telegram"

[[steps]]
title = "Configure Telegram channel + elevated tools (batch)"
target = "openclaw"
run = """openclaw config set --batch-json '[{"path":"channels.telegram.enabled","value":true},{"path":"channels.telegram.botToken","value":"{{service.vault.auth.secret}}"},{"path":"channels.telegram.allowFrom","value":["{{service.vault.ownerId}}"]},{"path":"channels.telegram.groupPolicy","value":"open"},{"path":"channels.telegram.groupAllowFrom","value":["{{service.vault.ownerId}}"]},{"path":"channels.telegram.reactionLevel","value":"minimal"},{"path":"channels.telegram.ackReaction","value":"👀"},{"path":"tools.elevated.allowFrom.telegram","value":["{{service.vault.ownerId}}"]}]' --strict-json"""

[[steps]]
title = "Restart OpenClaw"
target = "openclaw"
restart = true
