[recipe]
id = "telegram"
display_name = "Telegram"

[[steps]]
title = "Set Telegram bot token"
target = "openclaw"
run = "openclaw config set channels.telegram.botToken {{service.vault.auth.secret}}"

[[steps]]
title = "Enable Telegram channel"
target = "openclaw"
run = "openclaw config set channels.telegram.enabled true --strict-json"

[[steps]]
title = "Restart OpenClaw"
target = "openclaw"
restart = true
