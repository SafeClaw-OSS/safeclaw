[service]
id = "telegram"
name = "Telegram"

# Telegram's Bot API carries the token in the URL path (`/bot<TOKEN>/<method>`).
# The agent writes the phantom there; the proxy substitutes it at egress — no
# declaration needed beyond the host + secret.
hosts = ["api.telegram.org"]
secrets = ["TELEGRAM_BOT_TOKEN"]

[placeholders]
TELEGRAM_BOT_TOKEN = "123456:ABC-DEF1234..."
