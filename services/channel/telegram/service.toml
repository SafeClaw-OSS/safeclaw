[service]
id = "telegram"
name = "Telegram"
sub = "Bot API"
category = "channel"

# Telegram's Bot API embeds the token in the URL path itself
# (`/bot<TOKEN>/<method>`), so the upstream URL carries a template
# that's substituted with the resolved item bytes at forward time.
# The agent's relative path (`/sendMessage`, `/getUpdates`, …) is
# appended verbatim after.
[[upstream]]
id = "default"
url = "https://api.telegram.org/bot{{auth_value}}"
auth = { env = "telegram_bot_token", placeholder = "123456:ABC-DEF1234..." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true
