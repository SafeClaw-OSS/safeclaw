[service]
id = "telegram"
name = "Telegram"
sub = "Bot API"
category = "channel"

[[upstream]]
id = "default"
url = "https://api.telegram.org"
auth = { type = "path" }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "allow"
write = "allow"
