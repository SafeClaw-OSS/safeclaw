setup = """
Vercel's REST API takes a bearer token. Put the phantom in the header; the proxy
substitutes it at egress, the token never enters the agent:
  sc run -- curl https://api.vercel.com/v2/user \\
    -H "Authorization: Bearer __sc__vercel__"
Multi-account: switch the phantom value (__sc__vercel_work__).
"""

[service]
id = "vercel"
name = "Vercel"
# Classification for browse/filter and policy tag-floors; lowercase-kebab, multi OK.
tags = ["app"]

hosts = ["api.vercel.com"]
secrets = ["VERCEL_API_TOKEN"]
# Where a human mints the secret (auxiliary; display-only helper link).
secret_url = "https://vercel.com/account/settings/tokens"
