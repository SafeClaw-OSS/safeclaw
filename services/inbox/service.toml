[service]
id = "inbox"
name = "Inbox"
# Classification for browse/filter and policy tag-floors; lowercase-kebab, multi OK.
tags = ["app"]
help = """
A live target that receives broker-forwarded requests so you can see SafeClaw's
contract end-to-end. Put the connection's phantom (see `sc status`) in the
Authorization header and send to inbox.dev.safeclaw.pro; the /try page tails the
inbox over SSE so you can see exactly what the receiver saw — without ever holding
the raw value. Canonical shape: POST /api/messages {"message":"<text>"}; verify
with GET /recent (pre-approved, your own bucket only).
"""

hosts = ["inbox.dev.safeclaw.pro"]
secrets = ["INBOX_API_KEY"]
