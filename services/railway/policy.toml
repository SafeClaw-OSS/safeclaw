# Railway policy. The whole API is one GraphQL endpoint (POST /graphql/v2), so
# the read/write floor can't tell a query from a mutation — everything is POST.
# The token never enters the agent and egress is host-anchored, so routine work
# (deploys, variable/domain changes, redeploys, queries) rides the write=allow
# floor. The gate is spent only on the consequential few, matched by GraphQL
# mutation name in the request body. Each rule is a per-connection console toggle;
# loosen or split to taste.

[default]
read = "allow"
write = "allow"

# Mutation names below are ground truth from GraphQL introspection against
# backboard.railway.com/graphql/v2 (2026-07-08), not guessed.

# ── Destroy / lose work (irreversible) ───────────────────────────────────────
# workspaceDelete is the biggest: it takes every project under the workspace.
[[rule]]
id = "delete-infra"
label = "Delete a workspace, project, service, environment, or volume"
match = "POST /graphql/**"
body = "workspaceDelete|projectDelete|serviceDelete|environmentDelete|volumeDelete"
level = "ask-always"

# ── Mint a durable credential (escapes the broker) ───────────────────────────
# A new API token is a key SafeClaw never sees — the agent minting one via the
# API is a direct end-run around credential separation. Rare, so gating it costs
# nothing day to day.
[[rule]]
id = "mint-token"
label = "Mint an API token"
match = "POST /graphql/**"
body = "projectTokenCreate|apiTokenCreate"
level = "ask-always"

# ── Change who can get in (access posture) ───────────────────────────────────
# Adding/inviting a member, changing a role, transferring the project to a new
# owner, or adding an SSH key that grants shell into running containers. All rare,
# all consequential; matches github's collaborator / transfer / deploy-key gates.
[[rule]]
id = "change-access"
label = "Add a member, change a role, transfer ownership, or add an SSH key"
match = "POST /graphql/**"
body = "projectMemberAdd|projectMemberUpdate|projectInviteUser|projectTransfer|workspaceUserInvite|workspacePermissionChange|sshPublicKeyCreate"
level = "ask-always"
