setup = """
Route the user's git remotes through SafeClaw so the GitLab PAT never enters git
or your process. git authenticates to the broker with a credential helper that
reads $SAFECLAW_API_KEY at run-time — nothing lands on disk.

# Inspect first — don't assume gitlab.com:
git remote -v ; git config --get-regexp '^url\\.'

# 1) one-time per machine — register sc as the credential helper for the broker host:
git config --global credential."{{proxy_base}}".helper "!sc git-credential"

# 2) route GitLab through the broker (PAT injected at egress, never enters git):
git config --global url."{{proxy_base}}/stream/gitlab/".insteadOf "https://gitlab.com/"

# Run git with GIT_TERMINAL_PROMPT=0 so a misconfig fails fast. If an operation
# needs approval you'll get a link — surface it, the user taps a passkey, re-run.
"""

[service]
id = "gitlab"
name = "GitLab"

# One GitLab connection (one PAT) backs both the REST API and git: `rest` at
# /use/gitlab (buffered), `git` at /stream/gitlab (streamed smart-HTTP); both use
# GITLAB_TOKEN.

[[upstream]]
id = "rest"
url = "https://gitlab.com/api/v4"
auth = { secret = "GITLAB_TOKEN", placeholder = "glpat-..." }

  [upstream.headers]
  # PRIVATE-TOKEN is the unambiguous PAT header (Bearer also works).
  PRIVATE-TOKEN = "{{secret.GITLAB_TOKEN}}"

[[upstream]]
id = "git"
url = "https://gitlab.com"
stream = true
auth = { secret = "GITLAB_TOKEN" }

  [upstream.headers]
  # GitLab needs a non-empty Basic username (`oauth2`) with the token as password:
  # base64("oauth2:" + token), via `{{secret.X | basic:oauth2}}`.
  Authorization = "Basic {{secret.GITLAB_TOKEN | basic:oauth2}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:rest"
  returns = true
