setup = """
Routed (under `sc run` / the env bundle)? Nothing to configure — git resolves
credentials via the safeclaw helper.
Not routed? Prefix: `sc run -- git clone https://gitlab.com/<owner>/<repo>`.
For git you can also put the phantom in the URL username:
https://__sc__gitlab__@gitlab.com/<owner>/<repo>. Use HTTPS remotes; SSH is
outside the broker.
"""

[service]
id = "gitlab"
name = "GitLab"

# One GitLab connection (one PAT) backs both the REST API (gitlab.com/api/v4) and
# git-over-HTTPS (gitlab.com). Both share GITLAB_TOKEN.
hosts = ["gitlab.com"]
secrets = ["GITLAB_TOKEN"]
