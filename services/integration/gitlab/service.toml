setup = """
Route the user's git through SafeClaw so the GitLab PAT never enters git or your
process. Register the broker credential helper — host-scoped (only ever fires for
the broker), reads $SAFECLAW_API_KEY at run-time, nothing on disk:

  git config --global credential."{{proxy_base}}".helper "!sc git-credential"

Then route gitlab → broker. DEFAULT to non-invasive (the user's own git unaffected):
#   • per repo — use the broker URL as the remote:
#       git clone {{proxy_base}}/stream/gitlab/<owner>/<repo>.git
#   • transparent for YOUR session — put the rewrite in your OWN git env, so plain
#     gitlab.com URLs auto-route and the user's config stays untouched (no restart):
#       export GIT_CONFIG_COUNT=1 GIT_CONFIG_KEY_0="url.{{proxy_base}}/stream/gitlab/.insteadOf" GIT_CONFIG_VALUE_0="https://gitlab.com/"

# Route the USER's own git too (writes their global config) only if they want it —
# OFFER it (e.g. after repeated use), don't require an answer; stay on the default otherwise:
#   git config --global url."{{proxy_base}}/stream/gitlab/".insteadOf "https://gitlab.com/"

# GIT_TERMINAL_PROMPT=0 so a misconfig fails fast. An op needing approval returns a
# link — surface it, the user taps a passkey, re-run.
"""

[service]
id = "gitlab"
name = "GitLab"

# One GitLab connection (one PAT) backs both the REST API and git: `rest` at
# /use/gitlab (buffered), `git` at /stream/gitlab (streamed smart-HTTP); both use
# GITLAB_TOKEN.

[[upstream]]
id = "rest"
url = "https://gitlab.com/api/v4"
auth = { secret = "GITLAB_TOKEN", placeholder = "glpat-..." }

  [upstream.headers]
  # PRIVATE-TOKEN is the unambiguous PAT header (Bearer also works).
  PRIVATE-TOKEN = "{{secret.GITLAB_TOKEN}}"

[[upstream]]
id = "git"
url = "https://gitlab.com"
stream = true
auth = { secret = "GITLAB_TOKEN" }

  [upstream.headers]
  # GitLab needs a non-empty Basic username (`oauth2`) with the token as password:
  # base64("oauth2:" + token), via `{{secret.X | basic:oauth2}}`.
  Authorization = "Basic {{secret.GITLAB_TOKEN | basic:oauth2}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:rest"
  returns = true
