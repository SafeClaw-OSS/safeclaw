[default]
read = "allow"
write = "ask-always"

# ── Routine writes: downgrade from ask-always to ask ────────────────
[[rule]]
id = "create-event"
label = "Create event"
match = "POST /calendars/*/events"
level = "ask"

[[rule]]
id = "quickadd-event"
label = "Quick-add event"
match = "POST /calendars/*/events/quickAdd"
level = "ask"

[[rule]]
id = "move-event"
label = "Move event to another calendar"
match = "POST /calendars/*/events/*/move"
level = "ask"

[[rule]]
id = "edit-event"
label = "Edit event"
match = "PATCH /calendars/*/events/*"
level = "ask"

[[rule]]
id = "replace-event"
label = "Replace event"
match = "PUT /calendars/*/events/*"
level = "ask"
