[service]
id = "gcalendar"
name = "Google Calendar"
sub = "Google"
category = "integration"
color = "#4285f4"
docs = "https://developers.google.com/calendar/api"

[upstream]
url = "https://www.googleapis.com/calendar/v3"

[auth]
type = "oauth2"
provider = "google"

[defaults]
levels = { read = "allow", write = "ask" }

[[defaults.rules]]
method = "GET"
pathExact = "/calendar/v3/calendars/primary/events"
level = "allow"
