[service]
id = "gcalendar"
name = "Google Calendar"
sub = "Google"
category = "integration"

[upstream]
url = "https://www.googleapis.com/calendar/v3"

[upstream.auth]
type = "oauth2"
provider = "google"

[policy.levels]
read = "allow"
write = "ask"

[[policy.rules]]
method = "GET"
pathExact = "/calendar/v3/calendars/primary/events"
level = "allow"
