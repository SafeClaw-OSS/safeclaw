[service]
id = "gcalendar"
name = "Google Calendar"
sub = "Google"
category = "integration"

[[upstream]]
id = "default"
url = "https://www.googleapis.com/calendar/v3"
auth = { type = "oauth2", provider = "google" }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "allow"
write = "ask"

[[policy.rules]]
method = "GET"
path_exact = "/calendar/v3/calendars/primary/events"
level = "allow"
