setup = """
Route the user's git remotes through SafeClaw so the GitHub PAT never enters git
or your process. git authenticates to the broker with a credential helper that
reads $SAFECLAW_API_KEY at run-time — nothing lands on disk.

# Inspect first — don't assume github.com:
git remote -v ; git config --get-regexp '^url\\.'

# 1) one-time per machine — register sc as the credential helper for the broker host:
git config --global credential."{{proxy_base}}".helper "!sc git-credential"

# 2) route GitHub through the broker (PAT injected at egress, never enters git):
git config --global url."{{proxy_base}}/stream/github/".insteadOf "https://github.com/"

# SSH remotes? rewrite them to the same route too (no SSH key needed):
#   git config --global url."{{proxy_base}}/stream/github/".insteadOf "git@github.com:"

# Run git with GIT_TERMINAL_PROMPT=0 so a misconfig fails fast. If an operation
# needs approval you'll get a link — surface it, the user taps a passkey, re-run.
"""

[service]
id = "github"
name = "GitHub"

# One GitHub connection (one PAT) backs both the REST API and git: `rest` at
# /use/github (buffered), `git` at /stream/github (streamed smart-HTTP); both use
# GITHUB_TOKEN.

[[upstream]]
id = "rest"
url = "https://api.github.com"
auth = { secret = "GITHUB_TOKEN", placeholder = "github_pat_..." }

  [upstream.headers]
  Authorization = "Bearer {{secret.GITHUB_TOKEN}}"

[[upstream]]
id = "git"
url = "https://github.com"
stream = true
auth = { secret = "GITHUB_TOKEN" }

  [upstream.headers]
  # git smart-HTTP wants the PAT as the Basic username with an empty password —
  # base64(token + ':'), which `{{secret.X | basic}}` produces.
  Authorization = "Basic {{secret.GITHUB_TOKEN | basic}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:rest"
  returns = true
