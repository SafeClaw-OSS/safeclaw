[service]
id = "github"
name = "GitHub"
sub = "REST API"
category = "integration"

[[upstream]]
id = "default"
url = "https://api.github.com"
auth = { env = "github_token", placeholder = "github_pat_..." }

  [upstream.headers]
  Authorization = "Bearer {{auth_value}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true
