[service]
id = "gmail"
name = "Gmail"
sub = "Google"
category = "integration"

[[upstream]]
id = "default"
url = "https://gmail.googleapis.com"
auth = { type = "oauth2", provider = "google" }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "ask"
write = "ask-always"

[[policy.rules]]
method = "GET"
path_exact = "/gmail/v1/users/me/messages"
level = "allow"

[[policy.rules]]
method = "GET"
path_exact = "/gmail/v1/users/me/labels"
level = "allow"
