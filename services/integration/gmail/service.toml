[service]
id = "gmail"
name = "Gmail"
sub = "Google"
category = "integration"

[upstream]
url = "https://gmail.googleapis.com"

[upstream.auth]
type = "oauth2"
provider = "google"

[policy.levels]
read = "ask"
write = "ask-always"

[[policy.rules]]
method = "GET"
pathExact = "/gmail/v1/users/me/messages"
level = "allow"

[[policy.rules]]
method = "GET"
pathExact = "/gmail/v1/users/me/labels"
level = "allow"
