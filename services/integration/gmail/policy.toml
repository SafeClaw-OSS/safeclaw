# Gmail policy ‚Äî classified by risk tier (low/medium/high). The effective
# access level is derived live from the vault's `risk_policy`
# (default: low‚Üíallow, medium‚Üíask, high‚Üíask-always), so the user can re-tune
# all same-tier actions at once without editing each rule.

# Fallback for any Gmail request not matched by a rule below.
[default]
read = "ask"
write = "ask-always"

# ‚îÄ‚îÄ low: read-only metadata / listings, no private body, no side effect ‚îÄ‚îÄ
[[rule]]
id = "list-emails"
label = "List emails"
match = "GET /gmail/v1/users/me/messages"
risk = "low"

[[rule]]
id = "list-labels"
label = "List labels"
match = "GET /gmail/v1/users/me/labels"
risk = "low"

# ‚îÄ‚îÄ medium: reads private message content (privacy surface, but read-only) ‚îÄ‚îÄ
[[rule]]
id = "read-email"
label = "Read email content"
match = "GET /gmail/v1/users/me/messages/*"
risk = "medium"

# ‚îÄ‚îÄ high: outbound / mutating / hard to undo ‚îÄ‚îÄ
[[rule]]
id = "send-email"
label = "Send email"
match = "POST /gmail/v1/users/me/messages/send"
risk = "high"

[[rule]]
id = "modify-email"
label = "Modify labels / archive / trash"
match = "POST /gmail/v1/users/me/messages/*/modify"
risk = "high"

# ‚îÄ‚îÄ pinned: deletion is denied outright, regardless of risk_policy ‚îÄ‚îÄ
[[rule]]
id = "delete-email"
label = "Delete email"
match = "DELETE /gmail/v1/users/me/messages/*"
level = "deny"
