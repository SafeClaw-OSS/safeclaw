[default]
read = "ask"
write = "ask-always"

[[rule]]
id = "list-emails"
label = "List emails"
match = "GET /gmail/v1/users/me/messages"
level = "allow"

[[rule]]
id = "read-email"
label = "Read email content"
match = "GET /gmail/v1/users/me/messages/*"
level = "ask"

[[rule]]
id = "list-labels"
label = "List labels"
match = "GET /gmail/v1/users/me/labels"
level = "allow"

[[rule]]
id = "send-email"
label = "Send email"
match = "POST /gmail/v1/users/me/messages/send"
level = "ask-always"

[[rule]]
id = "delete-email"
label = "Delete email"
match = "DELETE /gmail/v1/users/me/messages/*"
level = "deny"
