[service]
id = "brave"
name = "Brave Search"
sub = "Web search"
category = "integration"

[[upstream]]
id = "default"
url = "https://api.search.brave.com"
auth = { type = "header", header = "X-Subscription-Token", placeholder = "BSA..." }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "allow"
write = "allow"
