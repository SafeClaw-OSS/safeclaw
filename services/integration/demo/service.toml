[service]
id = "demo"
name = "Demo (Echo)"
sub = "broker proof"
category = "integration"
help = """
A built-in playground service that proves SafeClaw's broker contract:
the daemon injects your vault secret into an upstream request without
ever exposing it to the agent. Drop a value into `env.demo_api_key`
on /try, then point any agent at `/use/demo/`. The destination
(httpbin.org/anything) echoes back the request including the
Authorization header — visible proof the secret was injected.
"""

[[upstream]]
id = "echo"
url = "https://httpbin.org/anything"
auth = { type = "bearer", env = "demo_api_key" }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:echo"
  returns = true
