[service]
id = "nodpay"
name = "NodPay"
sub = "Web3 agent wallet"
category = "integration"

[upstream]
type = "local"

[[upstream.apis]]
method = "POST"
path = "/sign"
env = { NODPAY_AGENT_KEY = "{{auth.secret}}" }
command = "npx nodpay sign"

[[upstream.apis]]
method = "GET"
path = "/wallets"
command = "npx nodpay wallets --json"

[policy.levels]
read = "allow"
write = "allow"
