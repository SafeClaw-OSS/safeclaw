[recipe]
id = "nodpay"
display_name = "NodPay"

[passkey_sharing]
enabled = true
origins = ["https://nodpay.ai"]

[[steps]]
title = "Install NodPay CLI"
run = "npm install -g nodpay"
target = "safeclaw"

[[steps]]
title = "Generate agent keypair"
run = "npx nodpay keygen"
note = "Reuses existing key if already generated"
target = "safeclaw"

[[steps]]
title = "Enable passkey sharing"
description = "Allows NodPay to create wallets using the same biometric passkey"
target = "safeclaw"

[[steps]]
title = "Install NodPay CLI"
run = "npm install -g nodpay"
target = "openclaw"

[[steps]]
title = "Configure remote wallet"
files = [
    { path = "~/.nodpay/config.json", content = '{"remote_wallet": "http://localhost:{{proxy_port}}/nodpay"}' },
]
target = "openclaw"
