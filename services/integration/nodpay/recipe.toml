[recipe]
id = "nodpay"
display_name = "NodPay"

[passkey_sharing]
enabled = true
origins = ["https://nodpay.ai"]

[[steps]]
title = "Install NodPay CLI"
target = "openclaw"
run = "npm install -g nodpay"

[[steps]]
title = "Configure remote wallet"
target = "openclaw"
files = [
  { path = ".nodpay/config.json", content = '{"remote_wallet":"http://localhost:{{safeclaw.proxy_port}}/nodpay","approve_base":"{{safeclaw.admin_url}}/approve/nodpay"}' },
]
note = "CLI reads remote_wallet to delegate sign/address/wallets to SafeClaw vault"

[[steps]]
title = "Install NodPay skill from ClawHub"
target = "openclaw"
run = "openclaw skills install nodpay --force"
note = "Downloads skill from ClawHub and enables agent to use NodPay propose/approve via SKILL.md"
