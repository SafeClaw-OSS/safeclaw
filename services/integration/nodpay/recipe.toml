[recipe]
id = "nodpay"
display_name = "NodPay"
requires_credential = false

[passkey_sharing]
enabled = true
origins = ["https://nodpay.ai"]

# ── SafeClaw vault side ──────────────────────────────────────────────────

[[steps]]
title = "Install NodPay CLI on vault"
run = "npm install -g nodpay"
target = "safeclaw"
note = "Required for local signing oracle (npx nodpay sign/address/wallets)"

# ── OpenClaw agent side ──────────────────────────────────────────────────

[[steps]]
title = "Install NodPay CLI"
run = "npm install -g nodpay"
target = "openclaw"

[[steps]]
title = "Configure remote wallet"
files = [
    { path = ".nodpay/config.json", content = '{"remote_wallet":"http://localhost:{{proxy_port}}/nodpay"}' },
]
target = "openclaw"
note = "CLI reads remote_wallet to delegate sign/address/wallets to SafeClaw vault"

[[steps]]
title = "Load NodPay skill"
run = "openclaw skill load nodpay"
target = "openclaw"
note = "Enables agent to use NodPay propose/approve via SKILL.md"
