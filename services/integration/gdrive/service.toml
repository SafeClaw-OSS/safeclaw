[service]
id = "gdrive"
name = "Google Drive"
description = "Google Drive file management"
category = "integration"
color = "#4285f4"
docs = "https://developers.google.com/drive/api"

[upstream]
url = "https://www.googleapis.com/drive/v3"

[auth]
type = "oauth2"
provider = "google"

[defaults]
levels = { read = "ask", write = "ask-always" }
