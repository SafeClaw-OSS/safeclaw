[service]
id = "gdrive"
name = "Google Drive"
sub = "Google"
category = "integration"

[[upstream]]
id = "default"
url = "https://www.googleapis.com/drive/v3"
auth = { type = "oauth2", provider = "google" }

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true

[policy.levels]
read = "ask"
write = "ask-always"

[[policy.rules]]
method = "GET"
path_exact = "/drive/v3/files"
level = "allow"
