[service]
id = "gdrive"
name = "Google Drive"
sub = "Google"
category = "integration"

[upstream]
url = "https://www.googleapis.com/drive/v3"

[upstream.auth]
type = "oauth2"
provider = "google"

[policy.levels]
read = "ask"
write = "ask-always"

[[policy.rules]]
method = "GET"
pathExact = "/drive/v3/files"
level = "allow"
