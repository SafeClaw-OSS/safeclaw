[recipe]
id = "openclaw-dashboard"
display_name = "OpenClaw Dashboard"

[[steps]]
title = "Enable Control UI"
target = "openclaw"
run = "openclaw config set gateway.controlUi.enabled true --strict-json"

[[steps]]
title = "Allow embedding from SafeClaw Pro and self-origin"
target = "openclaw"
run = """openclaw config set gateway.controlUi.allowedOrigins '["https://www.safeclaw.pro","https://{{safeclaw.instance_id}}.v.safeclaw.pro"]' --strict-json"""

[[steps]]
title = "Trust local Caddy reverse proxy"
target = "openclaw"
run = "openclaw config set gateway.trustedProxies '[\"127.0.0.1\",\"::1\"]' --strict-json"

[[steps]]
title = "Set token auth mode"
target = "openclaw"
run = "openclaw config set gateway.auth.mode token"

[[steps]]
title = "Set gateway token"
target = "openclaw"
run = "openclaw config set gateway.auth.token {{service.vault.gateway_token}}"

[[steps]]
title = "Restart OpenClaw"
target = "openclaw"
restart = true
