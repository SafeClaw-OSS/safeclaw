[service]
id = "openclaw-dashboard"
name = "OpenClaw Dashboard"
category = "integration"

[[api]]
method = "POST"
path = "/access"

  [[api.steps]]
  target = "safeclaw.vault"
  read = "services.openclaw-dashboard.gatewayToken"
  returns = true

  [[api.steps]]
  target = "openclaw"
  run = "openclaw devices approve --latest"
  retry = { attempts = 6, interval_ms = 500 }
