[service]
id = "openai"
name = "OpenAI"
help = """
Broker for the OpenAI REST API (api.openai.com/v1). Put your `sk-…`
key into `env.OPENAI_API_KEY`, then have your agent call
`/use/openai/chat/completions` (or any other v1 endpoint). SafeClaw
injects the bearer token at forward time — your agent never sees the
raw key.
"""

[[upstream]]
id = "default"
url = "https://api.openai.com/v1"
auth = { env = "OPENAI_API_KEY", placeholder = "sk-..." }

  [upstream.headers]
  Authorization = "Bearer {{secret.OPENAI_API_KEY}}"

[[api]]
path = "*"

  [[api.steps]]
  target = "upstream:default"
  returns = true
