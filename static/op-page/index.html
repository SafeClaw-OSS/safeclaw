<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SafeClaw — Passkey</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 4rem auto; padding: 1rem; line-height: 1.5; }
    h1 { font-size: 1.2rem; margin: 0 0 0.5rem; }
    .muted { color: #6b7280; font-size: 0.9rem; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.25rem; margin: 1rem 0; }
    button { font: inherit; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid currentColor; background: transparent; cursor: pointer; }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }
    #status { font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; margin-top: 0.75rem; }
    .ok { color: #15803d; } .err { color: #b91c1c; }
    @media (prefers-color-scheme: dark) { .card { border-color: #374151; } .muted { color: #9ca3af; } }
  </style>
</head>
<body>
  <h1>SafeClaw — Passkey authorization</h1>
  <p class="muted">Touch your passkey to authorize the CLI operation.</p>
  <div class="card">
    <div><strong id="op-label">…</strong> <span class="muted" id="vault-label"></span></div>
    <div style="margin-top:1rem"><button id="go-btn" disabled>Authorize</button> <button id="cancel-btn">Cancel</button></div>
    <p id="status" class="muted">Loading…</p>
  </div>
  <script type="module" src="/op-page/main.js"></script>
</body>
</html>
