# Consent descriptors for the vault's own control-plane acts — the acts.toml
# counterpart of a service.toml `[requests].consent` (same template grammar,
# different authorship domain: services declare what a REQUEST means, this file
# declares what a VAULT OPERATION means).
#
# Contract (docs/CONSENT_TEMPLATES.md):
# - Every approval surface (grant page, CLI prompt, audit row) renders from
#   THIS table interpolated over the SIGNED op's fields only — `{{vars.target}}`
#   and `{{vars.scope.<key>}}`. No surface may show requester-authored prose.
# - P3 rule: an undefined/empty var renders empty; a fact row whose value
#   renders empty (incl. `false`) is omitted. `true` renders as "yes".
# - `tone` is advisory upward-only for clients: a client's built-in danger
#   floor for an act kind can never be downgraded by this table.
# - Keep in lockstep with `DISPATCHED_CUSTOM_ACTS` (approve.rs) — the
#   `dispatch_and_table_agree` test fails on drift in either direction.

[acts.vault-unlock]
action = "Unlock vault"
action_zh = "解锁 vault"
explain = "Brings your vault online so your agent can use its stored credentials this session. No secret leaves SafeClaw."
explain_zh = "让你的 vault 上线，这个会话里你的 agent 就能用里面存的凭证。任何凭证都不会离开 SafeClaw。"
tone = "neutral"

[acts.vault-lock]
action = "Lock vault"
action_zh = "锁定 vault"
explain = "Takes your vault offline. Your agent can no longer use stored credentials until you unlock again."
explain_zh = "让你的 vault 下线。在你再次解锁之前，你的 agent 无法使用存储的凭证。"
tone = "neutral"

[acts.vault-delete]
action = "Delete vault"
action_zh = "删除 vault"
explain = "Permanently erases this vault and everything in it. This cannot be undone. You would have to set it up again from scratch."
explain_zh = "永久抹除此 vault 及其中的一切内容。此操作无法撤销，之后只能从头重新设置。"
tone = "danger"

[acts.rename-passkey]
action = "Rename a passkey"
action_zh = "重命名 Passkey"
explain = "Changes a passkey's display name. Keys and access are unchanged."
explain_zh = "仅更改 Passkey 的显示名称，密钥与访问权限不变。"
tone = "neutral"
facts = [
  { label = "New name", label_zh = "新名称", value = "{{vars.scope.new_name}}" },
]

[acts.widen-host]
action = "Permanently allow {{vars.scope.host}}"
action_zh = "永久允许 {{vars.scope.host}}"
explain = "Adds this exact host to the connection's allowed destinations forever. Every future brokered request may send its credential here without asking again. Grant only a host you trust."
explain_zh = "将此确切主机永久添加到该连接的允许目标。今后每个代理请求都可能不再询问就把凭证发送到这里。仅授权你信任的主机。"
tone = "danger"
facts = [
  { label = "Connection", label_zh = "连接", value = "{{vars.scope.connection_id}}" },
  { label = "Exact host", label_zh = "确切主机", value = "{{vars.scope.host}}" },
]

[acts.service-ls]
action = "List custom services"
action_zh = "列出自定义服务"
explain = "Reads the names and validity of this vault's custom service definitions. Nothing changes and no secret is revealed."
explain_zh = "读取此 vault 的自定义服务定义名称与有效性。不做任何更改，也不泄露任何密钥。"
tone = "neutral"

[acts.service-add]
action = "Add a custom service definition"
action_zh = "添加自定义服务定义"
explain = "Stores a service definition (hosts, auth shape, request rules) in your vault. It only takes effect for connections you explicitly create with it."
explain_zh = "将一个服务定义（主机、认证方式、请求规则）存入 vault。仅当你显式用它创建连接时才会生效。"
tone = "neutral"

[acts.service-rm]
action = "Remove custom service {{vars.target}}"
action_zh = "移除自定义服务 {{vars.target}}"
explain = "Deletes this custom service definition. Connections referencing it are kept but stop working until it is re-added."
explain_zh = "删除该自定义服务定义。引用它的连接会保留，但在重新添加之前无法工作。"
tone = "danger"

[acts.secret-rm]
action = "Remove secret {{vars.target}}"
action_zh = "移除密钥 {{vars.target}}"
explain = "Deletes this secret's value from your vault. Connections referencing it stop working until the key is re-added."
explain_zh = "从 vault 中删除该密钥的值。引用它的连接将无法工作，直到重新添加。"
tone = "danger"

[acts.connection-rm]
action = "Remove connection {{vars.target}}"
action_zh = "移除连接 {{vars.target}}"
explain = "Removes this connection and any secret only it references. Your agent loses access immediately."
explain_zh = "移除此连接，及仅被它引用的密钥。你的 agent 将立即失去访问。"
tone = "danger"
facts = [
  { label = "Secrets kept", label_zh = "保留密钥", value = "{{vars.scope.keep_secrets}}" },
]

[acts.connection-add]
action = "Add connection {{vars.target}}"
action_zh = "添加连接 {{vars.target}}"
explain = "Stores the listed secret key(s) in your vault and anchors them to the destination above. The values never left your device; this page only checks their fingerprint."
explain_zh = "将列出的密钥存入你的 vault，并锚定到上方的目标。密钥值从未离开你的设备，本页面只核对它的指纹。"
tone = "neutral"
facts = [
  { label = "Service", label_zh = "服务", value = "{{vars.scope.service}}" },
  { label = "Host", label_zh = "主机", value = "{{vars.scope.hosts}}" },
  { label = "Secret in use", label_zh = "使用的密钥", value = "{{vars.scope.secrets}}" },
]

[acts.secret-set]
action = "Store secret {{vars.target}}"
action_zh = "保存密钥 {{vars.target}}"
explain = "Stores this secret in your vault. If a host is shown above it is anchored there for brokered agent use; with no host, your agent cannot use it. The value never left your device."
explain_zh = "将该密钥存入你的 vault。上方显示主机时会锚定给 agent 经代理使用；未显示主机则 agent 无法使用。密钥值从未离开你的设备。"
tone = "neutral"
facts = [
  { label = "Host", label_zh = "主机", value = "{{vars.scope.hosts}}" },
]
