name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write       # sigstore OIDC — build-provenance attestation
  attestations: write   # publish the attestation to the GitHub/sigstore log

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: safeclaw-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: safeclaw-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: safeclaw-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: safeclaw-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      # build.rs embeds this as SC_BUILD_TAG so the binary self-reports the
      # full release identity (incl. -rc.N) — a file, not an env var, so it
      # reaches cross's build container via the workspace mount.
      - name: Stamp build tag
        run: echo "${{ github.ref_name }}" > .build-tag

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross, Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build (cargo, native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/safeclaw ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # The service catalog is a pure function of the compiled-in recipes, so
      # the released binary itself renders it offline (no daemon). This ships
      # `registry.json` as a per-release asset the console fetches — the catalog
      # can never drift from what this daemon version actually supports.
      - name: Render service catalog (registry.json)
        run: |
          chmod +x artifacts/safeclaw-linux-x86_64
          ./artifacts/safeclaw-linux-x86_64 registry --json > artifacts/registry.json
          echo "registry.json services: $(grep -c '\"id\"' artifacts/registry.json)"

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum safeclaw-* > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'artifacts/safeclaw-*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          # Semver channel: a hyphenated tag (v1.2.3-rc.1) is a pre-release, so
          # GitHub never moves the "latest" pointer to it and `sc upgrade` /
          # install.sh (which pull releases/latest) skip it. A bare vX.Y.Z is
          # stable and becomes latest. `sc upgrade --pre` opts into pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
