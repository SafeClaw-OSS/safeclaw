[package]
name = "safeclaw"
version = "0.3.0"
edition = "2021"
description = "Passkey-encrypted credential vault and proxy for AI agents"
license = "MIT"
repository = "https://github.com/xhyumiracle/safeclaw"

[dependencies]
# HTTP
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors"] }
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio", "client-legacy", "http1"] }
http-body-util = "0.1"

# Crypto
p256 = { version = "0.13", features = ["ecdh", "ecdsa", "jwk"] }
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.8"
zeroize = { version = "1", features = ["derive"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"

# HTTP client (for webhook)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
futures-util = "0.3"

# Policy + audit
rusqlite = { version = "0.32", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }

# Misc
clap = { version = "4", features = ["derive"] }
once_cell = "1"
url = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
mime_guess = "2"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
